name: "Terraform Azure Deploy"

on:
  push:
    branches:
      - "main"
  pull_request:
    branches:
      - "main"

permissions:
  id-token: write
  contents: read

jobs:
  terraform_plan:
    name: "Terraform Plan"
    runs-on: ubuntu-latest
    env:
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_USE_OIDC: true

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0

      - name: Terraform Format Check
        run: terraform fmt -check
        working-directory: ./terraform_infra
        continue-on-error: true

      - name: Terraform Init
        run: terraform init
        working-directory: ./terraform_infra

      - name: Terraform Validate
        run: terraform validate -no-color
        working-directory: ./terraform_infra

      # Generates a plan file named 'tfplan' and saves it
      - name: Terraform Plan
        run: terraform plan -no-color -out=tfplan
        working-directory: ./terraform_infra

      # Upload the generated plan file as a workflow artifact
      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: terraform_infra/tfplan
          retention-days: 1

  terraform_apply:
    name: "Terraform Apply"
    runs-on: ubuntu-latest
    needs: terraform_plan

    env:
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_USE_OIDC: true

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0

      # Download the plan file uploaded in the previous job
      - name: Download Plan Artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: terraform_infra/

      # Initialize Terraform again (needed because this job runs on a new runner)
      - name: Terraform Init
        run: terraform init
        working-directory: ./terraform_infra

      # Apply using the downloaded plan file
      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan
        working-directory: ./terraform_infra
